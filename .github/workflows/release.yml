# 发布预编译二进制到 GitHub Release
# 触发：推送 v* 标签（如 v1.0.4）
# 产出：linux-x64 / linux-aarch64 / android-arm64 / macos-arm64 / win-x64 tar.gz 包

name: Release

env:
  TERMUX_NDK_VERSION: "29.0.14206865"
  TERMUX_VCPKG_VERSION: "2026.04.27"
  VCPKG_DISABLE_METRICS: "1"

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64,      os: ubuntu-24.04 }
          - { name: linux-aarch64,  os: ubuntu-24.04-arm }
          - { name: android-arm64,  os: ubuntu-24.04 }
          - { name: macos-arm64,    os: macos-latest }
          - { name: win-x64,        os: windows-latest }

    steps:
      - uses: actions/checkout@v4

      # ======== 依赖 ========

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux' && matrix.name != 'android-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasio-dev libspdlog-dev libusb-1.0-0-dev libcxxopts-dev libevdev-dev libavformat-dev libavcodec-dev libswscale-dev libavutil-dev libgtest-dev

      - name: Install Android build tools
        if: matrix.name == 'android-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf autoconf-archive automake libtool pkg-config ninja-build
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --install "ndk;${TERMUX_NDK_VERSION}" >/dev/null
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${TERMUX_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${ANDROID_HOME}/ndk/${TERMUX_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Checkout pinned vcpkg (Android)
        if: matrix.name == 'android-arm64'
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          ref: ${{ env.TERMUX_VCPKG_VERSION }}
          path: .vcpkg-ci

      - name: Build Android dependencies
        if: matrix.name == 'android-arm64'
        shell: bash
        run: |
          ./.vcpkg-ci/bootstrap-vcpkg.sh -disableMetrics
          ./.vcpkg-ci/vcpkg install asio spdlog libusb \
            --triplet arm64-android-termux \
            --overlay-triplets="${GITHUB_WORKSPACE}/cmake/triplets"

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install asio spdlog libusb cxxopts ffmpeg googletest

      - name: Setup FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl-shared.zip"
          Write-Host "=== Downloading: $ffmpegUrl ==="
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile ffmpeg.zip
          Write-Host "=== Extracting ==="
          Expand-Archive -Path ffmpeg.zip -DestinationPath .
          $ffmpegDir = Get-ChildItem -Directory -Name "ffmpeg-*" | Select-Object -First 1
          if (-not $ffmpegDir) { Write-Error "ffmpeg extraction failed"; exit 1 }
          $ffmpegPath = (Resolve-Path $ffmpegDir).ToString().Replace('\', '/')
          Write-Host "FFMPEG_DIR=$ffmpegPath"
          Write-Host "=== Contents of lib/pkgconfig ==="
          Get-ChildItem "$ffmpegDir/lib/pkgconfig/"
          Write-Host "=== Setting env vars ==="
          "FFMPEG_DIR=$ffmpegPath" >> $env:GITHUB_ENV
          "PKG_CONFIG_PATH=$ffmpegPath/lib/pkgconfig" >> $env:GITHUB_ENV
          "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\tools\pkgconf" >> $env:GITHUB_PATH

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install asio spdlog libusb cxxopts pkgconf gtest --triplet x64-windows

      # ======== CMake 配置 ========

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux' && matrix.name != 'android-arm64'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSBIPDCPP_USE_PKGCONF_ASIO=ON \
            -DUSBIPDCPP_BUILD_SHARED_LIBS=ON \
            -DUSBIPDCPP_BUILD_VIRTUAL_DEVICE=ON \
            -DUSBIPDCPP_BUILD_LIBUSB_COMPONENTS=ON \
            -DUSBIPDCPP_BUILD_EXAMPLES=ON \
            -DUSBIPDCPP_INSTALL_EXAMPLES=ON \
            -DUSBIPDCPP_BUILD_TESTS=ON \
            -S ${{ github.workspace }}

      - name: Configure CMake (Android ARM64)
        if: matrix.name == 'android-arm64'
        shell: bash
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${GITHUB_WORKSPACE}/.vcpkg-ci/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake" \
            -DVCPKG_TARGET_TRIPLET=arm64-android-termux \
            -DVCPKG_OVERLAY_TRIPLETS="${GITHUB_WORKSPACE}/cmake/triplets" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_STL=c++_static \
            -DUSBIPDCPP_BUILD_SHARED_LIBS=OFF \
            -DUSBIPDCPP_BUILD_VIRTUAL_DEVICE=OFF \
            -DUSBIPDCPP_BUILD_LIBUSB_COMPONENTS=ON \
            -DUSBIPDCPP_BUILD_EXAMPLES=ON \
            -DUSBIPDCPP_BUILD_EXAMPLE_LIBUSB_SERVER=OFF \
            -DUSBIPDCPP_BUILD_EXAMPLE_TERMUX_LIBUSB_SERVER=ON \
            -DUSBIPDCPP_BUILD_TESTS=OFF \
            -DUSBIPDCPP_BUILD_PYTHON_BINDINGS=OFF \
            -DUSBIPDCPP_INSTALL_EXAMPLES=ON \
            -S "${GITHUB_WORKSPACE}"

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix)" \
            -DUSBIPDCPP_USE_PKGCONF_ASIO=ON \
            -DUSBIPDCPP_BUILD_SHARED_LIBS=ON \
            -DUSBIPDCPP_BUILD_VIRTUAL_DEVICE=ON \
            -DUSBIPDCPP_BUILD_LIBUSB_COMPONENTS=ON \
            -DUSBIPDCPP_BUILD_EXAMPLES=ON \
            -DUSBIPDCPP_INSTALL_EXAMPLES=ON \
            -DUSBIPDCPP_BUILD_TESTS=ON \
            -S ${{ github.workspace }}

      - name: Debug pkg-config (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "PKG_CONFIG_PATH=$env:PKG_CONFIG_PATH"
          Write-Host "PATH pkgconf check:"
          Get-Command pkgconf -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          Get-Command pkg-config -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          Write-Host "pkgconf search path:"
          pkgconf --variable pc_path pkg-config 2>$null
          Write-Host "Testing libavcodec:"
          pkgconf --modversion libavcodec 2>&1

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DUSBIPDCPP_BUILD_SHARED_LIBS=ON `
            -DUSBIPDCPP_BUILD_VIRTUAL_DEVICE=ON `
            -DUSBIPDCPP_BUILD_LIBUSB_COMPONENTS=ON `
            -DUSBIPDCPP_BUILD_EXAMPLES=ON `
            -DUSBIPDCPP_INSTALL_EXAMPLES=ON `
            -DUSBIPDCPP_BUILD_TESTS=ON `
            -S ${{ github.workspace }}

      # ======== 编译 + 测试 + 安装 ========

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        if: matrix.name != 'android-arm64'
        working-directory: build
        run: ctest --build-config Release

      - name: Verify Android executable
        if: matrix.name == 'android-arm64'
        shell: bash
        run: |
          BIN="build/termux_libusb_server"
          READELF="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
          test -x "$BIN"
          file "$BIN"
          "$READELF" -h "$BIN" | tee /tmp/termux-elf-header.txt
          grep -Eq 'Type:.*DYN' /tmp/termux-elf-header.txt
          grep -Eq 'Machine:.*AArch64' /tmp/termux-elf-header.txt
          "$READELF" -l "$BIN" | tee /tmp/termux-elf-program.txt
          grep -q '/system/bin/linker64' /tmp/termux-elf-program.txt
          "$READELF" -d "$BIN" | tee /tmp/termux-elf-dynamic.txt
          if grep -Eq 'lib(c\+\+_shared|usb|spdlog|fmt|usbipdcpp).*\.so' /tmp/termux-elf-dynamic.txt; then
            echo "Android package contains an unexpected shared-library dependency"
            exit 1
          fi

      - name: Install & package
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          DIRNAME="usbipdcpp-${VERSION}-${{ matrix.name }}"
          cmake --install build --config Release --prefix "${DIRNAME}"
          if [ "${{ matrix.name }}" = "android-arm64" ]; then
            cp LICENSE "${DIRNAME}/LICENSE"
            printf 'Source: %s\nCommit: %s\nAndroid ABI: arm64-v8a\nMinimum API: 24\n' \
              "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" "${GITHUB_SHA}" > "${DIRNAME}/BUILD_INFO.txt"
          fi
          # 复制 BtbN ffmpeg DLL 到安装目录（Windows）
          [ -n "$FFMPEG_DIR" ] && cp "$FFMPEG_DIR"/bin/*.dll "${DIRNAME}/bin/"
          tar czf "${DIRNAME}.tar.gz" "${DIRNAME}"
          echo "archive=${DIRNAME}.tar.gz" >> $GITHUB_ENV

      - name: Verify installed DLLs (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          DIRNAME="usbipdcpp-${VERSION}-${{ matrix.name }}"

          # 下载 wldd（Windows 上的 ldd 等价工具）
          curl -sL "https://github.com/marcoesposito1988/dependency_runner/releases/download/v1.5.0/wldd-x86_64-pc-windows-msvc.zip" -o wldd.zip
          unzip -q wldd.zip

          # 验证安装目录中每个 DLL 和 exe 的依赖是否完整
          echo "=== 检查已安装 DLL 的依赖完整性 ==="
          find "${DIRNAME}/bin" -type f \( -name "*.dll" -o -name "*.exe" \) -print0 > /tmp/files.txt
          while IFS= read -r -d '' file; do
            echo "--- $(basename "$file") ---"
            ./wldd.exe "$file" 2>&1
          done < /tmp/files.txt > /tmp/wldd_out.txt
          if grep -qiE "(not found|missing|could not)" /tmp/wldd_out.txt; then
            echo "存在未解析的 DLL 依赖！"
            grep -iE "(not found|missing|could not)" /tmp/wldd_out.txt
            exit 1
          fi
          echo "所有 DLL 依赖验证通过"

      # ======== 上传 artifact（所有平台建完后统一发到 Release） ========

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.archive }}
          if-no-files-found: error

  # 等待所有平台都成功后再统一上传到 Release
  release-upload:
    needs: [ release ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
